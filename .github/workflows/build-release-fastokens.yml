name: Build and Release fastokens

on:
  push:
    branches:
      - main
      - master
    paths:
      - "python/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"
    tags:
      - "*"
  pull_request:
    paths:
      - "python/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI and crates.io?"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-package:
    uses: ./.github/workflows/build-maturin.yml
    with:
      publish_pypi: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.publish) }}
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  crates-io:
    name: Publish fastokens to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify package
        run: cargo publish -p fasttokens-b10 --dry-run --locked
      - name: Publish
        if: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.publish) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p fasttokens-b10 --locked
