name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache Hugging Face tokenizers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface/hub
            ~/.cache/tokenizers
          key: ${{ runner.os }}-py${{ matrix.python-version }}-hf-tokenizers-${{ hashFiles('python/tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-hf-tokenizers-
            ${{ runner.os }}-hf-tokenizers-

      - name: Configure Hugging Face token
        run: |
          if [ -n "${HF_TOKEN:-}" ]; then
            mkdir -p ~/.cache/huggingface
            printf '%s' "$HF_TOKEN" > ~/.cache/huggingface/token
          fi

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip maturin pytest transformers==4.57.1

      - name: Build and install fastokens
        run: maturin build --release --out dist && pip install dist/*.whl

      - name: Run Python tests
        run: pytest python/tests -v
